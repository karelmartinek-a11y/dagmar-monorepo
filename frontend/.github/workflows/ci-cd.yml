name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dagmar-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Lint (pokud je konfigurace)
        run: |
          if [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f eslint.config.cjs ] || \
             [ -f .eslintrc ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.json ] || [ -f .eslintrc.yaml ] || [ -f .eslintrc.yml ]; then
            npm run lint
          else
            echo "ESLint konfigurace nenalezena, preskakuji lint"
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: check_secrets
        run: |
          missing=""
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing="$missing DEPLOY_HOST"
          [ -z "${{ secrets.DEPLOY_USER }}" ] && missing="$missing DEPLOY_USER"
          [ -z "${{ secrets.DEPLOY_PASS }}" ] && missing="$missing DEPLOY_PASS"
          if [ -n "$missing" ]; then
            echo "missing=$missing" >> $GITHUB_OUTPUT
          fi
      - name: Stop if secrets missing
        if: steps.check_secrets.outputs.missing
        run: |
          echo "Chybí secrets:${{ steps.check_secrets.outputs.missing }} – nasazení se přeskočí."
          exit 1
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          script: |
            set -e
            LOCK_FILE=/tmp/dagmar-deploy.lock
            exec 9>"$LOCK_FILE"
            flock 9
            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/karelmartinek-a11y/dagmar-frontend.git"
            if [ ! -d /srv/hcasc/_repos/dagmar-frontend/.git ]; then
              git clone "$REPO_URL" /srv/hcasc/_repos/dagmar-frontend
            fi
            cd /srv/hcasc/_repos/dagmar-frontend
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            rm -rf node_modules
            export NODE_OPTIONS=--dns-result-order=ipv4first
            npm ci
            npm run build
            FRONT_TAG=$(git rev-parse --short HEAD)
            printf '{"frontend_commit":"%s"}\n' "$FRONT_TAG" > /srv/hcasc/_repos/dagmar-frontend/dist/frontend-version.json
            if docker info >/dev/null 2>&1; then
              cd /opt/dagmar/sandbox
              docker compose down --remove-orphans || true
              docker compose rm -f || true
              python3 -m venv --clear /opt/dagmar/backend/.venv
              /opt/dagmar/backend/.venv/bin/pip install --upgrade pip
              /opt/dagmar/backend/.venv/bin/pip install /opt/dagmar/backend
              ./run-tests.sh
            else
              echo "Docker neni dostupny, sandbox testy preskakuji."
            fi
            rsync -a --no-owner --no-group --no-perms --delete /srv/hcasc/_repos/dagmar-frontend/dist/ /var/www/dagmar/frontend/
            printf '%s DAGMAR web: auto-deploy main\n' "$(date '+%F %T')" >> /var/log/dagmar/deploy.log || true
