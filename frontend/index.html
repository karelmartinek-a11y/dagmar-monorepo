<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="application-name" content="KájovoDagmar DOCHÁZKOVÝ SYSTÉM" />
    <meta name="theme-color" content="#020A15" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="KájovoDagmar DOCHÁZKOVÝ SYSTÉM." />

    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/png" href="/LOGO/assets/icons/favicon-64.png" />
    <link rel="apple-touch-icon" href="/LOGO/assets/icons/apple-touch-180.png" />

    <title>KájovoDagmar DOCHÁZKOVÝ SYSTÉM</title>

    <style>
      @font-face {
        font-family: "Montserrat";
        src: url("/LOGO/assets/fonts/Montserrat-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Montserrat";
        src: url("/LOGO/assets/fonts/Montserrat-Bold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --kb-bg: #020a15;
        --kb-surface: #14222f;
        --kb-border: #2c3746;
        --kb-text: #f4f7f9;
        --kb-muted: #a3adca;
        --kb-shadow: 0 14px 40px rgba(0, 0, 0, 0.3);
        --kb-radius: 8px;
        --kb-systembar-h: 52px;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--kb-bg);
        color: var(--kb-text);
        font-family: "Montserrat", sans-serif;
        font-variant-numeric: tabular-nums;
      }

      #root {
        min-height: 100%;
      }

      .kb-systembar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--kb-systembar-h);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: rgba(13, 25, 34, 0.96);
        border-bottom: 1px solid var(--kb-border);
        backdrop-filter: blur(10px);
      }

      .kb-signage { display: block; width: 220px; height: 38px; object-fit: contain; object-position: left center; }

      .kb-boot {
        min-height: 100vh;
        padding-top: calc(var(--kb-systembar-h) + 18px);
        display: grid;
        place-items: center;
        padding-left: 18px;
        padding-right: 18px;
      }

      .kb-boot-card {
        width: min(560px, 100%);
        background: var(--kb-surface);
        border: 1px solid var(--kb-border);
        border-radius: var(--kb-radius);
        box-shadow: var(--kb-shadow);
        padding: 22px;
        display: grid;
        gap: 14px;
      }

      .kb-boot-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .kb-boot-title {
        font-weight: 750;
        letter-spacing: 0.2px;
      }

      .kb-boot-sub {
        font-size: 12px;
        color: var(--kb-muted);
        line-height: 1.45;
      }

      .kb-boot-logo {
        width: 84px;
        height: 84px;
        object-fit: contain;
      }

      .kb-spinner {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 3px solid rgba(163, 173, 202, 0.25);
        border-top-color: #2b9790;
        animation: spin 1.05s linear infinite;
        justify-self: start;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <noscript>Pro použití aplikace je nutné povolit JavaScript.</noscript>

    <div id="root">
      <div class="kb-systembar" aria-label="Systémová lišta">
        <img class="kb-signage" src="/LOGO/assets/svg/logo-horizontal-dark.svg" alt="KájovoDagmar DOCHÁZKOVÝ SYSTÉM" />
      </div>

      <div class="kb-boot" aria-label="Načítání aplikace">
        <div class="kb-boot-card" role="status">
          <div class="kb-boot-head">
            <div>
              <div class="kb-boot-title">KájovoDagmar DOCHÁZKOVÝ SYSTÉM</div>
              <div class="kb-boot-sub">Načítám…</div>
            </div>
            <img class="kb-boot-logo" src="/LOGO/assets/svg/logo-mark.svg" alt="" />
          </div>
          <div class="kb-spinner" role="progressbar" aria-valuetext="Načítám" aria-busy="true"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
