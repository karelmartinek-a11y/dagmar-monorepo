name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dagmar-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade "pip>=26.0"
          pip install .[dev]
      - name: Syntax check
        run: python -m compileall app
      - name: Ruff lint
        run: ruff check app
      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          # pip-audit v tomto jobu audituje i nástrojové závislosti běžícího prostředí.
          # Pygments je sem přitažený přes rich/pip-audit samotný a v GitHub runneru zatím
          # vychází s CVE-2026-4539 bez dostupné opravné verze, proto jej explicitně ignorujeme.
          pip-audit --ignore-vuln CVE-2026-4539
      - name: Mypy
        run: mypy app
      - name: Tests (pokud existuji)
        run: |
          if [ -d tests ] || [ -d app/tests ]; then
            pytest -q
          else
            echo "Zadne testy nenalezeny, preskakuji pytest"
          fi

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: check_secrets
        run: |
          missing=""
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing="$missing DEPLOY_HOST"
          [ -z "${{ secrets.DEPLOY_USER }}" ] && missing="$missing DEPLOY_USER"
          [ -z "${{ secrets.DEPLOY_PASS }}" ] && missing="$missing DEPLOY_PASS"
          if [ -n "$missing" ]; then
            echo "missing=$missing" >> $GITHUB_OUTPUT
          fi
      - name: Stop if secrets missing
        if: steps.check_secrets.outputs.missing
        run: |
          echo "Chybí secrets:${{ steps.check_secrets.outputs.missing }} – nasazení se přeskočí."
          exit 1
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          command_timeout: 20m
          script: |
            set -e
            LOCK_FILE=/tmp/dagmar-deploy.lock
            exec 9>"$LOCK_FILE"
            flock 9
            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/karelmartinek-a11y/dagmar-backend.git"
            if [ ! -d /srv/hcasc/_repos/dagmar-backend/.git ]; then
              git clone "$REPO_URL" /srv/hcasc/_repos/dagmar-backend
            fi
            cd /srv/hcasc/_repos/dagmar-backend
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            DEPLOY_TAG=$(git rev-parse --short HEAD)
            mkdir -p /opt/dagmar/backend
            # /opt/dagmar/backend je deploy target, ne kanonický git checkout.
            # Pokud tam z minulosti zůstane .git, začne ukazovat historický HEAD,
            # i když je pracovní strom po rsync aktuální.
            rm -rf /opt/dagmar/backend/.git
            rsync -a --no-owner --no-group --no-perms --delete --exclude='.git' --exclude='.venv' --exclude='__pycache__/' --exclude='*.pyc' /srv/hcasc/_repos/dagmar-backend/ /opt/dagmar/backend/
            if [ ! -d /opt/dagmar/backend/.venv ]; then
              python3 -m venv /opt/dagmar/backend/.venv
            fi
            /opt/dagmar/backend/.venv/bin/pip install --upgrade pip
            /opt/dagmar/backend/.venv/bin/pip install /opt/dagmar/backend
            cd /opt/dagmar/backend
            printf '{"backend_commit":"%s"}\n' "$DEPLOY_TAG" > /opt/dagmar/backend/backend-version.json
            if [ -f /etc/dagmar/backend.env ]; then
              set -a
              . /etc/dagmar/backend.env
              set +a
            elif [ -f /opt/dagmar/backend/.env ]; then
              set -a
              . /opt/dagmar/backend/.env
              set +a
            fi
            if [ -n "${DAGMAR_DATABASE_URL:-}" ]; then
              /opt/dagmar/backend/.venv/bin/alembic -c /opt/dagmar/backend/app/db/alembic.ini upgrade head
            else
              echo "DAGMAR_DATABASE_URL neni nastavena, migrace preskakuji."
            fi
            sudo systemctl restart dagmar-backend
            if docker info >/dev/null 2>&1; then
              cd /opt/dagmar/sandbox && ./run-tests.sh
            else
              echo "Docker neni dostupny, sandbox testy preskakuji."
            fi
            printf '%s DAGMAR backend: auto-deploy main\n' \"$(date '+%F %T')\" >> /var/log/dagmar/deploy.log || true
